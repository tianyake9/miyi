name: 自动更新节点&规则
on:
  # 每天北京时间凌晨2点自动运行（可改）
  schedule:
    - cron: "0 18 * * *"
  # 支持手动点按钮运行
  workflow_dispatch:

# 给脚本仓库写入权限，才能自动提交更新
permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 执行自动更新脚本
        run: bash update_geoip.sh

      - name: 提交&推送更新
        run: |
          git config --global user.name "AutoUpdateBot"
          git config --global user.email "bot@github.com"
          git add .
          git commit -m "🤖 自动更新节点&规则 $(date '+%Y-%m-%d %H:%M')" || echo "无更新无需提交"
          git push

